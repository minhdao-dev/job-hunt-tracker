<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Job Hunt Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <style>
        body {
            justify-content: center;
        }

        .center-box {
            width: 100%;
            max-width: 420px;
            padding: 48px 24px;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<button class="theme-toggle-icon" onclick="Theme.toggle()">
    <svg id="theme-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
</button>

<div class="center-box">
    <div class="brand" style="margin-bottom:36px">
        <div class="brand-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <span class="brand-name">JOB HUNT TRACKER</span>
    </div>

    <!-- Form gửi email -->
    <div id="form-wrap">
        <h1 class="form-title">Forgot password?</h1>
        <p class="form-subtitle">Enter your email and we'll send you a reset link.</p>

        <div id="error-box" class="error-box"></div>

        <form onsubmit="handleForgot(event)">
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <button type="submit" class="btn" id="btn">Send reset link</button>
        </form>

        <p class="switch" style="margin-top:20px">
            <a href="/login" style="color:var(--accent2);text-decoration:none">← Back to sign in</a>
        </p>
    </div>

    <!-- Thông báo đã gửi -->
    <div id="sent-wrap" style="display:none;text-align:center">
        <div style="font-size:48px;margin-bottom:20px">📬</div>
        <h2 class="form-title">Check your email</h2>
        <p class="form-subtitle">
            If <strong id="sent-email" style="color:var(--accent2)"></strong> is registered,
            you'll receive a password reset link shortly.
        </p>
        <p class="switch" style="margin-top:24px">
            <a href="/login" style="color:var(--accent2);text-decoration:none">← Back to sign in</a>
        </p>
    </div>
</div>

<script th:src="@{/js/theme.js}"></script>
<script>
    async function handleForgot(e) {
        e.preventDefault();
        const btn = document.getElementById('btn');
        const errBox = document.getElementById('error-box');
        const email = document.getElementById('email').value.trim();

        btn.disabled = true;
        btn.textContent = 'Sending...';
        errBox.style.display = 'none';

        try {
            await fetch('/api/v1/auth/forgot-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            // Luôn show success để chống user enumeration
            document.getElementById('sent-email').textContent = email;
            document.getElementById('form-wrap').style.display = 'none';
            document.getElementById('sent-wrap').style.display = 'block';
        } catch {
            errBox.textContent = 'Something went wrong. Please try again.';
            errBox.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Send reset link';
        }
    }
</script>
</body>
</html>
