<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Job Hunt Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <style>
        body {
            justify-content: center;
        }

        .center-box {
            width: 100%;
            max-width: 420px;
            padding: 48px 24px;
        }
    </style>
</head>
<body>

<button class="theme-toggle-icon" onclick="Theme.toggle()">
    <svg id="theme-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
</button>

<div class="center-box">
    <div class="brand" style="margin-bottom:36px">
        <div class="brand-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <span class="brand-name">JOB HUNT TRACKER</span>
    </div>

    <div id="form-wrap">
        <h1 class="form-title">Set new password</h1>
        <p class="form-subtitle">Enter your new password below.</p>

        <div id="error-box" class="error-box"></div>

        <form onsubmit="handleReset(event)">
            <div class="field">
                <label>New password</label>
                <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8">
                <p class="hint">At least 8 characters</p>
            </div>
            <div class="field">
                <label>Confirm password</label>
                <input type="password" id="confirm" placeholder="Repeat new password" required>
            </div>
            <button type="submit" class="btn" id="btn">Reset password</button>
        </form>
    </div>

    <div id="success-wrap" style="display:none;text-align:center">
        <div style="font-size:48px;margin-bottom:20px">✅</div>
        <h2 class="form-title">Password reset!</h2>
        <p class="form-subtitle">Your password has been updated successfully.</p>
        <a href="/login" class="btn" style="display:inline-block;margin-top:8px;text-decoration:none">Sign in now →</a>
    </div>

    <div id="invalid-wrap" style="display:none;text-align:center">
        <div style="font-size:48px;margin-bottom:20px">❌</div>
        <h2 class="form-title">Link expired</h2>
        <p class="form-subtitle">This reset link has expired or already been used.</p>
        <a href="/forgot-password" class="btn" style="display:inline-block;margin-top:8px;text-decoration:none">Request
            new link</a>
    </div>
</div>

<script th:src="@{/js/theme.js}"></script>
<script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
        document.getElementById('form-wrap').style.display = 'none';
        document.getElementById('invalid-wrap').style.display = 'block';
    }

    async function handleReset(e) {
        e.preventDefault();
        const btn = document.getElementById('btn');
        const errBox = document.getElementById('error-box');
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;

        if (password !== confirm) {
            errBox.textContent = 'Passwords do not match';
            errBox.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting...';
        errBox.style.display = 'none';

        try {
            const res = await fetch('/api/v1/auth/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token, newPassword: password})
            });

            if (res.ok) {
                document.getElementById('form-wrap').style.display = 'none';
                document.getElementById('success-wrap').style.display = 'block';
            } else {
                const data = await res.json();
                errBox.textContent = data.detail || 'Invalid or expired reset link';
                errBox.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Reset password';
            }
        } catch {
            errBox.textContent = 'Something went wrong. Please try again.';
            errBox.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Reset password';
        }
    }
</script>
</body>
</html>
