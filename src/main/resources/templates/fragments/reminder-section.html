<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<th:block th:fragment="reminders">
    <div class="section-header">
        <span class="section-title">Reminders</span>
        <button class="btn-add" onclick="openModal('reminder-modal')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add reminder
        </button>
    </div>

    <div class="reminder-list-detail" id="reminder-list">
        <div class="tab-empty" id="reminder-empty" style="display:none">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
            <strong>No reminders set</strong>
            <span>Add a reminder to follow up on time</span>
        </div>
    </div>
</th:block>

</body>
</html>
