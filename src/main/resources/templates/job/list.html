<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Applications</title>
    <link rel="stylesheet" th:href="@{/css/jobs-list.css}">
</head>
<body>
<th:block layout:fragment="content">

    <!-- Toolbar -->
    <div class="list-toolbar fade-up">
        <div class="search-wrap">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search position or company...">
        </div>

        <select class="filter-select" id="status-filter" onchange="filterStatus(this.value)">
            <option value="">All statuses</option>
            <option value="APPLIED">Applied</option>
            <option value="INTERVIEWING">Interviewing</option>
            <option value="OFFERED">Offered</option>
            <option value="REJECTED">Rejected</option>
            <option value="GHOSTED">Ghosted</option>
            <option value="WITHDRAWN">Withdrawn</option>
        </select>

        <button class="btn-primary" onclick="openAddJob()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add job
        </button>
    </div>

    <!-- Status chips -->
    <div class="stats-bar fade-up" style="animation-delay:0.05s">
        <div class="stat-chip active" id="chip-all" onclick="filterStatus('')">
            <span>All</span>
            <span class="stat-chip-count" id="chip-all-count">—</span>
        </div>
        <div class="stat-chip" id="chip-applied" onclick="filterStatus('APPLIED')">
            <span class="stat-chip-dot" style="background:#818cf8"></span>
            <span>Applied</span>
            <span class="stat-chip-count" id="chip-applied-count">—</span>
        </div>
        <div class="stat-chip" id="chip-interviewing" onclick="filterStatus('INTERVIEWING')">
            <span class="stat-chip-dot" style="background:#fbbf24"></span>
            <span>Interviewing</span>
            <span class="stat-chip-count" id="chip-interviewing-count">—</span>
        </div>
        <div class="stat-chip" id="chip-offered" onclick="filterStatus('OFFERED')">
            <span class="stat-chip-dot" style="background:#4ade80"></span>
            <span>Offered</span>
            <span class="stat-chip-count" id="chip-offered-count">—</span>
        </div>
        <div class="stat-chip" id="chip-rejected" onclick="filterStatus('REJECTED')">
            <span class="stat-chip-dot" style="background:#f87171"></span>
            <span>Rejected</span>
            <span class="stat-chip-count" id="chip-rejected-count">—</span>
        </div>
        <div class="stat-chip" id="chip-ghosted" onclick="filterStatus('GHOSTED')">
            <span class="stat-chip-dot" style="background:#71717a"></span>
            <span>Ghosted</span>
            <span class="stat-chip-count" id="chip-ghosted-count">—</span>
        </div>
    </div>

    <!-- Table -->
    <div class="jobs-table-wrap fade-up" style="animation-delay:0.1s">
        <table class="jobs-table">
            <thead>
            <tr>
                <th>Position</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Source</th>
                <th>Applied</th>
                <th style="width:70px"></th>
            </tr>
            </thead>
            <tbody id="jobs-tbody">
            <tr>
                <td colspan="6" style="padding:32px 16px;text-align:center;color:var(--text3)">Loading...</td>
            </tr>
            </tbody>
        </table>

        <div class="pagination">
            <span id="page-info" style="font-size:12px;color:var(--text3)">Loading...</span>
            <div class="page-btns" id="page-btns"></div>
        </div>
    </div>

    <!-- ── ADD/EDIT MODAL ── -->
    <div class="modal-overlay" id="job-modal">
        <div class="modal">
            <div class="modal-head">
                <span class="modal-title" id="modal-title">Add application</span>
                <button class="modal-close" onclick="closeModal()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="form-error" class="error-box" style="display:none;margin-bottom:14px"></div>
                <form id="job-form" onsubmit="return false">
                    <div class="form-group">
                        <label>Position *</label>
                        <input type="text" id="j-position" placeholder="Java Backend Developer">
                    </div>
                    <div class="form-group">
                        <label>Company</label>
                        <select id="j-company">
                            <option value="">No company</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Source</label>
                            <select id="j-source">
                                <option value="LINKEDIN">LinkedIn</option>
                                <option value="ITVIEC">ITViec</option>
                                <option value="TOPCV">TopCV</option>
                                <option value="VIETNAMWORKS">VietnamWorks</option>
                                <option value="CAREERVIET">CareerViet</option>
                                <option value="COMPANY_WEBSITE">Company Website</option>
                                <option value="REFERRAL">Referral</option>
                                <option value="FACEBOOK">Facebook</option>
                                <option value="OTHER" selected>Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Priority</label>
                            <select id="j-priority">
                                <option value="HIGH">High</option>
                                <option value="MEDIUM" selected>Medium</option>
                                <option value="LOW">Low</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Salary min</label>
                            <input type="number" id="j-salary-min" placeholder="15000000" min="0">
                        </div>
                        <div class="form-group">
                            <label>Salary max</label>
                            <input type="number" id="j-salary-max" placeholder="25000000" min="0">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Currency</label>
                            <select id="j-currency">
                                <option value="VND" selected>VND</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Applied date</label>
                            <input type="date" id="j-applied">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Job URL</label>
                        <input type="url" id="j-url" placeholder="https://...">
                    </div>
                    <div class="form-group" style="display:flex;align-items:center;gap:8px">
                        <input type="checkbox" id="j-remote" style="width:auto;accent-color:var(--accent)">
                        <label for="j-remote"
                               style="text-transform:none;font-size:13px;letter-spacing:0;color:var(--text2);cursor:pointer;margin-bottom:0">Remote
                            position</label>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="j-notes" placeholder="Your notes about this position..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" id="btn-save-job" onclick="saveJob()">Save</button>
            </div>
        </div>
    </div>

</th:block>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/jobs-list.js}"></script>
    <script>
        document.getElementById('page-title').textContent = 'Applications';
    </script>
</th:block>
</body>
</html>
