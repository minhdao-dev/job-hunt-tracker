<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Companies</title>
    <link rel="stylesheet" th:href="@{/css/companies-list.css}">
</head>
<body>
<th:block layout:fragment="content">

    <!-- Toolbar -->
    <div class="list-toolbar fade-up">
        <div class="search-wrap">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search companies...">
        </div>

        <button class="btn-primary" onclick="openAddCompany()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add company
        </button>
    </div>

    <!-- Grid -->
    <div class="companies-grid fade-up" id="companies-grid" style="animation-delay:0.05s">
        <!-- rendered by JS -->
    </div>

    <!-- ── MODAL ── -->
    <div class="modal-overlay" id="company-modal">
        <div class="modal">
            <div class="modal-head">
                <span class="modal-title" id="modal-title">Add company</span>
                <button class="modal-close" onclick="closeModal()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="form-error" class="error-box" style="display:none;margin-bottom:14px"></div>
                <form id="company-form" onsubmit="return false">
                    <div class="form-group">
                        <label>Company name *</label>
                        <input type="text" id="c-name" placeholder="Google, Shopee, VNG...">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Industry</label>
                            <input type="text" id="c-industry" placeholder="Technology, Finance...">
                        </div>
                        <div class="form-group">
                            <label>Company size</label>
                            <select id="c-size">
                                <option value="UNKNOWN">Unknown</option>
                                <option value="STARTUP">Startup (&lt;50)</option>
                                <option value="SME">SME (50–500)</option>
                                <option value="LARGE">Large (500–5000)</option>
                                <option value="ENTERPRISE">Enterprise (5000+)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="c-location" placeholder="Ho Chi Minh City...">
                        </div>
                        <div class="form-group">
                            <label>Website</label>
                            <input type="url" id="c-website" placeholder="https://...">
                        </div>
                    </div>
                    <div class="form-group" style="display:flex;align-items:center;gap:8px">
                        <input type="checkbox" id="c-outsource" style="width:auto;accent-color:var(--accent)">
                        <label for="c-outsource"
                               style="text-transform:none;font-size:13px;letter-spacing:0;color:var(--text2);cursor:pointer;margin-bottom:0">
                            Outsourcing company
                        </label>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="c-notes" placeholder="Culture, benefits, interview process..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" id="btn-save-company" onclick="saveCompany()">Save</button>
            </div>
        </div>
    </div>

</th:block>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/companies-list.js}"></script>
    <script>
        document.getElementById('page-title').textContent = 'Companies';
    </script>
</th:block>
</body>
</html>
