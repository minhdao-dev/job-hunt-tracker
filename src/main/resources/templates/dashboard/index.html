<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<th:block layout:fragment="content">

    <div class="greeting fade-up">
        <div class="greeting-hello" id="greeting-hello">Good morning 👋</div>
        <div class="greeting-sub" id="greeting-sub">Loading your overview...</div>
    </div>

    <!-- Metrics -->
    <div class="metrics">
        <div class="metric-card fade-up" style="animation-delay:0s">
            <div class="metric-header">
                <span class="metric-label">Applications</span>
                <div class="metric-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
            </div>
            <div class="metric-value" id="m-total">—</div>
            <div class="metric-sub" id="m-response">— response rate</div>
        </div>

        <div class="metric-card fade-up" style="animation-delay:0.05s">
            <div class="metric-header">
                <span class="metric-label">Active</span>
                <div class="metric-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
            </div>
            <div class="metric-value" id="m-active">—</div>
            <div class="metric-sub">Applied + Interviewing</div>
        </div>

        <div class="metric-card fade-up" style="animation-delay:0.1s">
            <div class="metric-header">
                <span class="metric-label">Interviews</span>
                <div class="metric-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
            </div>
            <div class="metric-value" id="m-interviews">—</div>
            <div class="metric-sub">Total rounds</div>
        </div>

        <div class="metric-card fade-up" style="animation-delay:0.15s">
            <div class="metric-header">
                <span class="metric-label">Offers</span>
                <div class="metric-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
                    </svg>
                </div>
            </div>
            <div class="metric-value" id="m-offers">—</div>
            <div class="metric-sub" id="m-offer-rate">— offer rate</div>
        </div>
    </div>

    <!-- Charts row -->
    <div class="dash-grid">
        <div class="card fade-up" style="animation-delay:0.2s">
            <div class="card-head">
                <span class="card-title">Status breakdown</span>
            </div>
            <div class="donut-wrap">
                <div class="donut-chart-container">
                    <canvas id="donut-chart"></canvas>
                    <div class="donut-center">
                        <span class="donut-num" id="donut-total">0</span>
                        <span class="donut-lbl">Total</span>
                    </div>
                </div>
                <div class="legend" id="donut-legend"></div>
            </div>
        </div>

        <div class="card fade-up" style="animation-delay:0.25s">
            <div class="card-head">
                <span class="card-title">Recent applications</span>
                <a href="/jobs" class="card-action">View all →</a>
            </div>
            <table class="data-table">
                <thead>
                <tr>
                    <th>Position</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Date</th>
                </tr>
                </thead>
                <tbody id="jobs-tbody">
                <tr>
                    <td colspan="4" style="padding:20px 16px">
                        <div class="skel" style="width:60%;margin-bottom:6px"></div>
                        <div class="skel" style="width:40%"></div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Bottom row -->
    <div class="dash-grid-full" style="margin-top:8px">
        <div class="card fade-up" style="animation-delay:0.3s">
            <div class="card-head">
                <span class="card-title">Pending reminders</span>
                <span class="metric-sub" id="m-reminders">—</span>
            </div>
            <div id="reminder-list">
                <div class="empty">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                    Loading...
                </div>
            </div>
        </div>

        <div class="card fade-up" style="animation-delay:0.35s">
            <div class="card-head">
                <span class="card-title">Pending</span>
            </div>
            <div class="reminder-big-wrap">
                <div class="reminder-big-num" id="m-reminders-big">—</div>
                <div class="reminder-big-lbl">reminders waiting</div>
            </div>
        </div>
    </div>

</th:block>

<th:block layout:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script th:src="@{/js/dashboard.js}"></script>
    <script>
        document.getElementById('page-title').textContent = 'Dashboard';
    </script>
</th:block>
</body>
</html>
