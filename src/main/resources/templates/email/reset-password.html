<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{email/layout}">
<body>
<th:block layout:fragment="content">

    <p>Xin chào <strong th:text="${fullName}">Nguyen Minh Dao</strong>,</p>

    <p>Chúng tôi nhận được yêu cầu đặt lại mật khẩu cho tài khoản của bạn.</p>

    <a th:href="${resetUrl}" class="btn btn-danger">
        🔑 Đặt lại mật khẩu
    </a>

    <div class="note">
        <p>Link có hiệu lực trong <strong>15 phút</strong>.</p>
        <p>
            Nếu bạn không yêu cầu, hãy bỏ qua email này.
            Mật khẩu sẽ không thay đổi.
        </p>
    </div>

</th:block>
</body>
</html>
