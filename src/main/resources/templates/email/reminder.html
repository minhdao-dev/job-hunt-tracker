<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{email/layout}">
<body>
<th:block layout:fragment="content">

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" style="padding-bottom:24px">
                <div style="display:inline-block;width:60px;height:60px;background-color:#f0fdf4;border-radius:12px;font-size:28px;text-align:center;line-height:60px">
                    🔔
                </div>
            </td>
        </tr>
    </table>

    <h1 style="margin:0 0 6px 0;font-size:22px;font-weight:700;color:#111827;letter-spacing:-0.02em;line-height:1.3">
        Nhắc nhở của bạn
    </h1>
    <p style="margin:0 0 18px 0;font-size:14px;color:#6b7280;line-height:1.6">
        Xin chào <strong style="color:#111827" th:text="${fullName}">bạn</strong>,
    </p>

    <p style="margin:0 0 16px 0;font-size:14px;color:#374151;line-height:1.8">
        Bạn có một nhắc nhở cho vị trí
        <strong style="color:#6366f1" th:text="${position}">Java Developer</strong>:
    </p>

    <!-- Message -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px">
        <tr>
            <td style="background-color:#f9f9fb;border:1px solid #e5e7eb;border-radius:8px;padding:16px 18px">
                <p style="margin:0;font-size:14px;color:#111827;line-height:1.8" th:text="${message}">Nội dung nhắc
                    nhở</p>
            </td>
        </tr>
    </table>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td style="border-top:1px solid #e5e7eb;padding-bottom:20px"></td>
        </tr>
    </table>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td style="background-color:#f5f3ff;border-left:4px solid #6366f1;border-radius:6px;padding:12px 16px">
                <p style="margin:0;font-size:13px;color:#374151;line-height:1.7">
                    💡 Tắt thông báo tại <strong>Settings → Notifications</strong>.
                </p>
            </td>
        </tr>
    </table>

</th:block>
</body>
</html>
